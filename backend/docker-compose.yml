services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "${APP_NAME:-OutcomeIQ API}"
      APP_VERSION: "${APP_VERSION:-0.1.0}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      API_V1_PREFIX: "${API_V1_PREFIX:-/api/v1}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}"
      DATABASE_URL: "${DATABASE_URL:-}"
      REDIS_URL: "${REDIS_URL:-}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-this-in-development}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

# PostgreSQL and Redis are intentionally absent from the Day 1 foundation.
